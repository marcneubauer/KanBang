name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup auto-detects version from package.json packageManager field
      - uses: pnpm/action-setup@v4

      # Node version from .nvmrc, with pnpm store cached between runs
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Static analysis
      - run: pnpm typecheck
      - run: pnpm lint

      # Unit + integration tests (E2E excluded — requires running servers)
      - run: pnpm test:unit

      # Verify production build succeeds
      - run: pnpm build
